<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 GitHub Profile Finder</h1>
            <p>Search for any GitHub user</p>
        </header>

        <div class="search-box">
            <input type="text" id="usernameInput" placeholder="Enter GitHub username...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="loading" id="loading">Searching...</div>
        
        <div class="error" id="error">
            <div class="error-icon">😕</div>
            <div class="error-message">User not found. Please try another username.</div>
        </div>

        <div class="profile-card" id="profileCard">
            <div class="profile-header">
                <img id="avatar" class="avatar" src="" alt="Avatar">
                <div class="profile-info">
                    <h2 class="profile-name" id="name"></h2>
                    <div class="profile-username" id="username"></div>
                    <p class="profile-bio" id="bio"></p>
                </div>
            </div>

            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-value" id="repos">0</div>
                    <div class="stat-label">Repositories</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="following">0</div>
                    <div class="stat-label">Following</div>
                </div>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <span class="detail-icon">🏢</span>
                    <span id="company">Not available</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">📍</span>
                    <span id="location">Not available</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">🔗</span>
                    <a href="#" id="blog" target="_blank">Not available</a>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">📅</span>
                    <span id="created">Joined GitHub</span>
                </div>
            </div>

            <div class="repos-section">
                <h3>Latest Repositories</h3>
                <div class="repos-grid" id="reposGrid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
